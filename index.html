<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gema Idul Fitri 1447 H</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Amiri:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --deep-blue: #0a0f1e;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000;
        }

        .scene {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s ease-in-out;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        .active-scene {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        #stage-opening {
            background: radial-gradient(circle at center, #78350f 0%, #451a03 50%, #000 100%);
            overflow: hidden;
        }

        .lantern {
            position: absolute;
            background: rgba(252, 211, 77, 0.4);
            border-radius: 4px 4px 2px 2px;
            box-shadow: 0 0 15px #fbbf24;
            pointer-events: none;
            animation: float-up var(--duration) linear infinite;
            opacity: 0.6;
        }

        @keyframes float-up {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) translateX(var(--drift)) rotate(20deg); opacity: 0; }
        }

        .dust {
            position: absolute;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0.3;
            animation: twinkle var(--t-duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .mosque-silhouette {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35vh;
            background-color: rgba(0,0,0,0.6);
            clip-path: polygon(0% 100%, 0% 90%, 5% 85%, 12% 50%, 20% 85%, 30% 70%, 40% 40%, 45% 35%, 50% 15%, 55% 35%, 60% 40%, 70% 70%, 80% 85%, 88% 50%, 95% 85%, 100% 90%, 100% 100%);
            z-index: 5;
        }

        #stage-bubbles {
            background: #fdfcf0;
        }

        .bubble {
            position: absolute;
            bottom: -180px;
            background: white;
            border: 1px solid rgba(197, 160, 89, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #78350f;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            animation: rise 12s infinite linear;
            backdrop-filter: blur(2px);
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(0.9); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(-135vh) scale(1.1); opacity: 0; }
        }

        #stage-interlude {
            background: #000;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        #shock-star {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 50px 20px white;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
        }

        .star-pulse {
            animation: starSequence 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes starSequence {
            0% { transform: scale(0); opacity: 0; }
            15% { transform: scale(1.5); opacity: 1; }
            45% { transform: scale(400); opacity: 1; }
            55% { transform: scale(400); opacity: 0; }
            100% { transform: scale(0); opacity: 0; }
        }

        .interlude-silhouette {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40vh;
            background: linear-gradient(to top, rgba(197, 160, 89, 0.3), transparent);
            clip-path: polygon(0% 100%, 10% 70%, 20% 40%, 30% 75%, 45% 30%, 55% 30%, 70% 75%, 80% 40%, 90% 70%, 100% 100%);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2s ease-out, transform 2s ease-out;
            z-index: 5;
        }

        .show-silhouette {
            opacity: 1;
            transform: translateY(0);
        }

        #cloud-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .cloud-half {
            flex: 1;
            background: white;
            width: 100%;
            transition: transform 1.5s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #cloud-top { transform: translateY(-100%); border-radius: 0 0 50% 50%; }
        #cloud-bottom { transform: translateY(100%); border-radius: 50% 50% 0 0; }

        .clouds-active #cloud-top { transform: translateY(0); }
        .clouds-active #cloud-bottom { transform: translateY(0); }

        #stage-final {
            background: var(--deep-blue);
        }

        #fireworks-canvas {
            position: absolute;
            inset: 0;
            z-index: 5;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 2rem;
            border-radius: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            z-index: 20;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: floating 5s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .font-arabic { font-family: 'Amiri', serif; }
        .font-cursive { font-family: 'Dancing Script', cursive; }

        .btn-open {
            background: white;
            color: #78350f;
            padding: 18px 45px;
            border-radius: 100px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            border: none;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-open:hover {
            transform: scale(1.05);
            background: #fef3c7;
        }
    </style>
</head>
<body class="bg-black">

    <div id="cloud-overlay">
        <div id="cloud-top" class="cloud-half"></div>
        <div id="cloud-bottom" class="cloud-half"></div>
    </div>

    <div id="stage-opening" class="scene active-scene">
        <div id="opening-fx-container" class="absolute inset-0"></div>
        <div class="text-center text-white mb-12 z-20 px-6">
            <h2 class="font-arabic text-6xl md:text-7xl mb-4 drop-shadow-lg text-amber-200">رمضان كريم</h2>
            <div class="w-16 h-1 bg-amber-400 mx-auto mb-6 rounded-full opacity-50"></div>
            <p class="tracking-[0.6em] text-[10px] md:text-xs uppercase font-bold opacity-80 mb-10">Mengenang Syukur, Menjemput Fitrah</p>
            <button onclick="goToBubbles()" class="btn-open">TELUSURI MAKNA ✨</button>
        </div>
        <div class="mosque-silhouette"></div>
    </div>

    <div id="stage-bubbles" class="scene">
        <div class="z-20 text-center px-6 pointer-events-none mt-10">
            <h3 class="text-amber-800 text-lg md:text-xl font-bold italic mb-2">Mengingat Kembali...</h3>
            <p class="text-amber-900/40 text-sm font-medium">Perjuangan kita di bulan suci Ramadhan</p>
        </div>
        <div id="bubble-container" class="absolute inset-0"></div>
    </div>

    <div id="stage-interlude" class="scene">
        <div id="shock-star"></div>
        <div id="interlude-sil" class="interlude-silhouette"></div>
        <div class="px-6 flex flex-col items-center z-10">
            <p id="interlude-text-1" class="text-slate-400 text-sm tracking-[0.4em] uppercase mb-4 opacity-0 transition-opacity duration-1000">Hingga pada akhirnya...</p>
            <div id="interlude-main" class="hidden opacity-0 transition-opacity duration-1000">
                <h2 class="text-white text-3xl md:text-5xl font-bold tracking-[0.2em] uppercase">Hari Itu Tiba</h2>
            </div>
        </div>
    </div>

    <div id="stage-final" class="scene">
        <canvas id="fireworks-canvas"></canvas>
        <div class="message-box text-white">
            <h2 class="font-arabic text-6xl text-amber-300 mb-6 drop-shadow-md">عيد مبارك</h2>
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">Selamat Hari Raya<br>Idul Fitri 1447 H</h1>
            <div class="w-20 h-0.5 bg-amber-400/50 mx-auto mb-8"></div>
            <p class="text-xl md:text-2xl font-cursive text-amber-100/90 leading-relaxed mb-10">Minal 'Aidin wal Faizin,<br>Mohon Maaf Lahir & Batin</p>
            <div class="text-[10px] tracking-[0.3em] text-slate-400 font-bold uppercase">
                <p>Creative made by :</p>
                <p class="text-white text-sm mt-2 font-bold tracking-normal">Rahmad Agil Santoso</p>
            </div>
        </div>
    </div>

    <script>
        function initOpeningFX() {
            const container = document.getElementById('opening-fx-container');
            for(let i=0; i<15; i++) {
                const lantern = document.createElement('div');
                lantern.className = 'lantern';
                const sizeW = Math.random() * 8 + 6;
                const sizeH = sizeW * 1.4;
                lantern.style.width = `${sizeW}px`;
                lantern.style.height = `${sizeH}px`;
                lantern.style.left = `${Math.random() * 100}%`;
                lantern.style.setProperty('--duration', `${Math.random() * 10 + 10}s`);
                lantern.style.setProperty('--drift', `${Math.random() * 100 - 50}px`);
                lantern.style.animationDelay = `${Math.random() * 10}s`;
                container.appendChild(lantern);
            }
            for(let i=0; i<40; i++) {
                const dust = document.createElement('div');
                dust.className = 'dust';
                const size = Math.random() * 3;
                dust.style.width = `${size}px`;
                dust.style.height = `${size}px`;
                dust.style.left = `${Math.random() * 100}%`;
                dust.style.top = `${Math.random() * 100}%`;
                dust.style.setProperty('--t-duration', `${Math.random() * 3 + 2}s`);
                dust.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(dust);
            }
        }

        window.onload = initOpeningFX;

        const bubblesData = [
            "Lapar yang menahan amarah",
            "Dahaga yang melatih syukur",
            "Sahur di kala mata terlelap",
            "Lidah yang terjaga dari ghibah",
            "Mengejar berkah Lailatul Qadar",
            "Tarawih dalam lelahnya raga",
            "Sabar dalam antrean berbuka",
            "Doa di sepertiga malam terakhir",
            "Mensucikan harta dengan zakat",
            "Lolos SNBP ga ya",
            "Tilawah penyejuk relung jiwa"
        ];

        function switchScene(fromId, toId) {
            document.getElementById(fromId).classList.remove('active-scene');
            document.getElementById(toId).classList.add('active-scene');
        }

        function goToBubbles() {
            switchScene('stage-opening', 'stage-bubbles');
            createBubbles();
            setTimeout(triggerInterlude, 11000);
        }

        function createBubbles() {
            const container = document.getElementById('bubble-container');
            const columns = 5; 
            const columnWidth = 100 / columns;

            bubblesData.forEach((text, i) => {
                setTimeout(() => {
                    if(!document.getElementById('stage-bubbles').classList.contains('active-scene')) return;
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble';
                    const size = Math.random() * 40 + 120;
                    bubble.style.width = `${size}px`;
                    bubble.style.height = `${size}px`;
                    const columnIndex = i % columns; 
                    const randomOffset = (Math.random() * (columnWidth * 0.6)); 
                    bubble.style.left = `${(columnIndex * columnWidth) + randomOffset + 5}%`;
                    bubble.innerHTML = `<span style="padding: 10px; display: block;">${text}</span>`;
                    bubble.style.animationDuration = `${Math.random() * 3 + 10}s`;
                    container.appendChild(bubble);
                }, i * 800);
            });
        }

        function triggerInterlude() {
            switchScene('stage-bubbles', 'stage-interlude');
            const text1 = document.getElementById('interlude-text-1');
            const star = document.getElementById('shock-star');
            const main = document.getElementById('interlude-main');
            const sil = document.getElementById('interlude-sil');
            
            setTimeout(() => { text1.style.opacity = '1'; }, 1000);

            setTimeout(() => {
                text1.style.opacity = '0';
                setTimeout(() => {
                    star.classList.add('star-pulse');
                    setTimeout(() => {
                        main.classList.remove('hidden');
                        main.style.opacity = '1';
                        sil.classList.add('show-silhouette');
                    }, 1600); 
                }, 1000);
            }, 3500);

            setTimeout(triggerCloudTransition, 9000);
        }

        function triggerCloudTransition() {
            const overlay = document.getElementById('cloud-overlay');
            overlay.classList.add('clouds-active');
            setTimeout(() => {
                switchScene('stage-interlude', 'stage-final');
                initFireworks();
            }, 1000);
            setTimeout(() => {
                overlay.classList.remove('clouds-active');
            }, 2000);
        }

        function initFireworks() {
            const canvas = document.getElementById('fireworks-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor(x, y, color) {
                    this.x = x; this.y = y; this.color = color;
                    this.velocity = { x: (Math.random() - 0.5) * 12, y: (Math.random() - 0.5) * 12 };
                    this.alpha = 1; this.friction = 0.96; this.gravity = 0.15;
                }
                draw() {
                    ctx.save(); ctx.globalAlpha = this.alpha;
                    ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                    ctx.fill(); ctx.restore();
                }
                update() {
                    this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                    this.velocity.y += this.gravity; this.x += this.velocity.x;
                    this.y += this.velocity.y; this.alpha -= 0.01;
                }
            }

            function animate() {
                if(!document.getElementById('stage-final').classList.contains('active-scene')) return;
                requestAnimationFrame(animate);
                ctx.fillStyle = 'rgba(10, 15, 30, 0.25)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, i) => {
                    if (p.alpha > 0) { p.update(); p.draw(); } else { particles.splice(i, 1); }
                });
            }
            animate();
            setInterval(() => {
                if(!document.getElementById('stage-final').classList.contains('active-scene')) return;
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height * 0.4);
                const colors = ['#fcd34d', '#fbbf24', '#ffffff', '#60a5fa', '#f472b6'];
                for (let i = 0; i < 50; i++) particles.push(new Particle(x, y, colors[Math.floor(Math.random()*colors.length)]));
            }, 800);
        }
    </script>
</body>
</html>
